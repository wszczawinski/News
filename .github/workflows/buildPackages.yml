name: Build and Security Checks

on:
  push:
    branches: [develop]
  pull_request:
    branches: [master, develop]

jobs:
  build-check:
    name: 🔨 Build Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: '24'
          cache: true
          run-install: true

      - run: vp check

      - run: vp build

  security-check:
    name: 🔐 Security Check (Snyk)
    needs: build-check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: '24'
          cache: true
          run-install: true

      - name: Install Snyk CLI
        run: npm install -g snyk@latest

      - name: Authenticate with Snyk
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: snyk auth $SNYK_TOKEN

      - name: 📦 Snyk Dependency Scan (SCA)
        run: snyk test --severity-threshold=medium --all-projects
        continue-on-error: true

      - name: 🧠 Snyk Code Scan (SAST)
        run: snyk code test --severity-threshold=medium
        continue-on-error: true

      - name: 📡 Monitor for Future Issues
        if: github.ref == 'refs/heads/develop'
        run: snyk monitor
